<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>共通講義棟東 - 名城大学自動販売機マップ</title>
    <!-- cssを読み込む -->
    <link rel="stylesheet" href="css/BuildingE.css" />
  </head>

  <body>
    <!-- ヘッダーエリア（タイトルは左、ボタン2つは右に並ぶ） -->
    <header class="header">
      <!-- 左側：サイトロゴタイトル -->
      <div class="site-title">名城大学 学内自販機マップ</div>

      <!-- 右側：ナビゲーションボタン群 -->
      <div class="nav-actions">
        <!-- トップへ戻るボタン -->
        <a href="index.html" class="top-back-btn">トップへ戻る</a>

        <!-- 詳しく探すボタン（ハンバーガーメニュー） -->
        <button class="menu-btn" id="menu-trigger">
          <span>🔍</span> 詳しく探す
        </button>
      </div>
    </header>

    <!-- ドロワーメニュー -->
    <nav id="drawer-menu" class="drawer-menu">
      <div class="menu-title">別の建物を見る</div>
      <div class="building-list">
        <ul class="building-link-list">
            <li><a href="Tower.html">① タワー75</a></li>
            <li><a href="BuildingN.html">② 共通講義棟北 (N)</a></li>
            <li><a href="BuildingS.html">③ 共通講義棟南 (S)</a></li>
            <li><a href="BuildingE.html" class="current">④ 共通講義棟東 (E)</a></li>
        </ul>
      </div>
    </nav>

    <!-- メインコンテンツ -->
    <main class="main-content">
      <!-- フロアマップエリア -->
      <section class="floor-map-section">
        <h2 class="section-title">エリア別詳細フロア図面</h2>

        <!-- 説明 -->
        <div class="map-notice">
          <p>🚩 図面上の丸は自動販売機の場所を表示しています。</p>
          <p>
            <span class="txt-coca-cola">赤：コカ・コーラ</span>、
            <span class="txt-suntory">緑：サントリー</span>、
            <span class="txt-georgia">紫：ジョージア</span>、
            <span class="txt-dydo">オレンジ：Dydo</span>
          </p>
        </div>

        <!-- 建物名（中央寄せ） -->
        <h3 class="building-title-center">共通講義棟東 フロアマップ</h3>

        <!-- 階ごとのフロアマップ画像（縦並び） -->
        <div class="floor-container">
          <span class="floor-badge">1階</span>
          <div class="floor-img-container">
            <img src="image/E1.png" alt="共通講義棟東 1階" />
          </div>
        </div>

        <div class="floor-container">
          <span class="floor-badge">2階,3階</span>
          <div class="floor-img-container">
            <img src="image/E23.png" alt="共通講義棟東 2階,3階" />
          </div>
        </div>

        <div class="floor-container">
          <span class="floor-badge">4階,5階</span>
          <div class="floor-img-container">
            <img src="image/E45.png" alt="共通講義棟東 4階,5階" />
          </div>
        </div>

        <div class="floor-container">
          <span class="floor-badge">6階,7階</span>
          <div class="floor-img-container">
            <img src="image/E67.png" alt="共通講義棟東 6階,7階" />
          </div>
        </div>
      </section>
    </main>

    <div id="overlay" class="overlay"></div>

    <!-- 外部JSファイルを読み込む -->
    <script src="toggle-menu.js"></script>
  </body>
</html>
